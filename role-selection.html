<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - Exam Sync</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: var(--navy);
        }

        .selection-container {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }

        .selection-header h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .selection-header p {
            font-size: 1.2rem;
            color: var(--text-light);
            margin-bottom: 50px;
        }

        .cards-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .role-card {
            background: var(--surface-strong);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 50px 40px;
            text-decoration: none;
            color: var(--navy);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            max-width: 400px;
            width: 100%;
        }

        .role-card:hover {
            transform: translateY(-15px);
            border-color: rgba(124, 119, 255, 0.22);
            box-shadow: var(--shadow-lg);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background: var(--mint);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 30px;
            box-shadow: 0 18px 45px rgba(64, 217, 198, 0.18);
        }

        .faculty-card .icon-container {
            background: var(--purple);
            box-shadow: 0 18px 45px rgba(124, 119, 255, 0.18);
        }

        .role-card h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .role-card p {
            font-size: 1.1rem;
            color: var(--text-light);
            line-height: 1.5;
        }

        .back-link {
            display: inline-block;
            margin-top: 50px;
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--navy);
        }
    </style>
</head>

<body class="auth-page">
    <div class="selection-container">
        <div class="selection-header">
            <h1>Join Exam Sync</h1>
            <p>Choose your account type to get started</p>
        </div>

        <div class="cards-grid">
            <a href="signup.html?role=student" class="role-card student-card">
                <div class="icon-container">🎓</div>
                <h2>Student</h2>
                <p>Access study materials, PYQs, & coordinate with peers</p>
            </a>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>
</body>

</html>
