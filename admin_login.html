<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login - Exam Sync</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
            position: relative;
        }

        .login-container {
            position: relative;
            z-index: 10;
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            background: rgba(10, 40, 40, 0.7);
            border: 1px solid rgba(0, 201, 167, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 201, 167, 0.3);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header h2 {
            margin-bottom: 12px;
            color: white;
            font-weight: 800;
            font-size: 36px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            color: var(--navy);
            font-weight: 500;
        }

        .form-group input:focus {
            border-color: #00c9a7;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 201, 167, 0.3);
        }

        .btn-block {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c9a7, #00897b);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 201, 167, 0.4);
        }

        .error-msg {
            background: rgba(255, 107, 107, 0.1);
            color: var(--coral);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }
    </style>
</head>

<body class="auth-page">
    <a href="index.html" class="back-arrow"
        style="position: fixed; top: 20px; left: 20px; text-decoration: none; color: white; font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); transition: 0.3s; z-index: 1000;">&larr; Back to Home</a>
    <div class="login-container">
        <div class="login-header">
            <h2>Admin Login</h2>
            <p>Access the control center.</p>
        </div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" placeholder="admin@examsync.com" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required />
            </div>

            <button type="submit" class="btn-block" id="loginBtn">Authorize Access</button>
        </form>

        <p class="error-msg" id="errorMsg"></p>
    </div>

    <script type="module">
        import { login } from './js/auth.js';
        import { showToast } from './js/notifications.js';

        const loginForm = document.getElementById('adminLoginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = "Verifying Authorization...";

            try {
                // Admin login doesn't require a name check like faculty
                const result = await login(email, password);
                
                if (result.success) {
                    if (result.role === 'admin') {
                        showToast("Access Granted!", "success");
                        setTimeout(() => {
                            window.location.href = 'admin_dashboard.html';
                        }, 800);
                    } else {
                        showToast("Access Denied: Admin Privileges Required", "error");
                        loginBtn.disabled = false;
                        loginBtn.textContent = "Authorize Access";
                    }
                } else {
                    showToast(result.message || "Invalid credentials.", "error");
                    loginBtn.disabled = false;
                    loginBtn.textContent = "Try Again";
                }
            } catch (error) {
                showToast("System Error. Try again.", "error");
                loginBtn.disabled = false;
                loginBtn.textContent = "Authorize Access";
            }
        });
    </script>
</body>

</html>
