<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Exam Sync</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: none;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 10;
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: white;
            background: rgba(10, 40, 40, 0.7);
            border: 1px solid rgba(0, 201, 167, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 201, 167, 0.3);
        }

        .login-header h2 {
            margin-bottom: 12px;
            color: white;
            font-weight: 800;
            font-size: 36px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            font-size: 16px;
            transition: 0.3s;
            color: var(--navy);
            font-weight: 500;
        }

        .form-group input::placeholder {
            color: rgba(102, 112, 133, 0.9);
        }

        .form-group input:focus {
            border-color: #00c9a7;
            background: rgba(255, 255, 255, 0.92);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 201, 167, 0.3);
        }

        .btn-block {
            width: 100%;
            margin-top: 20px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c9a7, #00897b);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 201, 167, 0.4);
            filter: brightness(1.1);
        }

        .error-msg {
            background: rgba(255, 107, 107, 0.1);
            color: var(--coral);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            display: none;
            border: 1px solid rgba(255, 107, 107, 0.2);
        }

        .otp-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .footer-links {
            margin-top: 25px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
        }

        .footer-links a {
            color: #00c9a7;
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            text-shadow: 0 0 8px rgba(0, 201, 167, 0.5);
            color: white;
        }

        .resend-otp {
            margin-top: 15px;
            font-size: 14px;
            color: var(--text-light);
        }

        .resend-otp span {
            color: var(--purple);
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body class="auth-page">
    <a href="index.html" class="back-arrow"
        style="position: fixed; top: 20px; left: 20px; text-decoration: none; color: white; font-size: 14px; font-weight: 600; background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px); transition: 0.3s; z-index: 1000;">&larr; Back to Home</a>
    <div class="login-container auth-card">
        <!-- Step 1: Credentials -->
        <div id="credentialsSection">
            <div class="login-header">
                <h2>Student Login</h2>
                <p>Enter your email and password to continue.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>



                <button type="submit" class="btn primary btn-block" id="loginBtn">Student Login</button>
                
                <div style="margin: 25px 0 15px; position: relative; text-align: center;">
                    <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: rgba(0,0,0,0.1); z-index: 1;"></div>
                    <span style="position: relative; z-index: 2; background: white; padding: 0 15px; color: var(--text-light); font-size: 14px; font-weight: 600;">OR</span>
                </div>

                <button type="button" class="btn primary btn-block" onclick="window.location.href='faculty_login.html'" 
                        style="background: linear-gradient(90deg, #00c9a7, #00897b); border: none;">
                    Dedicated Faculty Login
                </button>
            </form>
        </div>
 
        <p class="error-msg" id="errorMsg"></p>
 
        <div class="footer-links">
            Don't have an account? <a href="signup.html?role=student"
                style="color: var(--purple); font-weight: 700; text-decoration: none;">Create Account</a>
            <div style="margin-top: 15px;">
                <a href="forgot_password.html?role=student"
                    style="color: #00c9a7; font-weight: 700; text-decoration: none;">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { login } from './js/auth.js';
        import { showToast } from './js/notifications.js';

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = "Verifying...";

            try {
                const result = await login(email, password);
                if (result.success) {
                    if (result.otp_required) {
                        showToast("Credentials verified! Sending PIN...", "success");
                        const params = new URLSearchParams({ email, type: 'login' });
                        setTimeout(() => window.location.href = `verify.html?${params.toString()}`, 1000);
                    } else {
                        // Direct login (Admin, Student, Faculty)
                        showToast("Login Successful! Redirecting...", "success");
                        setTimeout(() => {
                            if (result.role === 'admin') window.location.href = 'admin_dashboard.html';
                            else if (result.role === 'author') window.location.href = 'author_dashboard.html';
                            else window.location.href = 'academic_profile.html';
                        }, 1000);
                    }
                } else {
                    showToast(result.message || "Invalid email or password.", "error");
                    if (result.message && result.message.includes("not registered")) {
                        showToast("Redirecting to Signup...", "info");
                        setTimeout(() => window.location.href = 'signup.html?role=student', 2000);
                    }
                    loginBtn.disabled = false;
                    loginBtn.textContent = "Student Login";
                }
            } catch (error) {
                showToast("Server Error. Please try again.", "error");
                loginBtn.disabled = false;
                loginBtn.textContent = "Student Login";
            }
        });
    </script>
</body>

</html>
