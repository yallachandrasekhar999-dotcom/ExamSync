<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Exam Sync</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            background: #0a2828;
            color: white;
        }

        .login-container {
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(10, 40, 40, 0.7);
            border: 1px solid rgba(0, 201, 167, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 201, 167, 0.3);
        }

        .login-header h2 {
            margin-bottom: 12px;
            font-weight: 800;
            font-size: 32px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 201, 167, 0.2);
            border-radius: 12px;
            font-size: 16px;
            color: #101828;
        }

        .btn-block {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 12px;
            background: linear-gradient(90deg, #00c9a7, #00897b);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 201, 167, 0.4);
        }

        .footer-links {
            margin-top: 25px;
        }

        .footer-links a {
            color: #00c9a7;
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-header">
            <h2>Forgot Password</h2>
            <p>Enter your registered email to receive a reset link.</p>
        </div>

        <form id="forgotForm">
            <div class="form-group" id="nameGroup" style="display: none;">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Dr. Sarah Smith">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="btn-block" id="sendBtn">Send Reset Link</button>
        </form>

        <div class="footer-links">
            <a href="faculty_login.html" id="backToLogin">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { authAPI } from './js/api.js';
        import { showToast } from './js/notifications.js';

        const forgotForm = document.getElementById('forgotForm');
        const sendBtn = document.getElementById('sendBtn');
        const nameGroup = document.getElementById('nameGroup');
        const nameInput = document.getElementById('name');
        const backToLogin = document.getElementById('backToLogin');

        // Check for role in URL
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'author';

        // Update UI based on role
        if (role === 'author' || role === 'faculty') {
            nameGroup.style.display = 'block';
            nameInput.required = true;
            backToLogin.href = 'faculty_login.html';
            backToLogin.textContent = 'Back to Faculty Login';
        } else if (role === 'student') {
            nameGroup.style.display = 'none';
            nameInput.required = false;
            backToLogin.href = 'student_login.html';
            backToLogin.textContent = 'Back to Student Login';
        }

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const name = nameInput.value;

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                // Prepare request data
                const requestData = { email };
                if (name && nameGroup.style.display !== 'none') {
                    requestData.name = name;
                }

                const result = await authAPI.forgotPassword(requestData.email, requestData.name);
                showToast(result.message, "success");
                
                // Redirect after success
                setTimeout(() => {
                    if (role === 'student') {
                        window.location.href = 'student_login.html';
                    } else {
                        window.location.href = 'faculty_login.html';
                    }
                }, 3000);
            } catch (error) {
                showToast(error.message || "Failed to send reset link.", "error");
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
