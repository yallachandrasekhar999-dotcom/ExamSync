<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Exam Sync</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Poppins', sans-serif;
            background: #0a2828;
            color: white;
        }

        .login-container {
            padding: 50px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(10, 40, 40, 0.7);
            border: 1px solid rgba(0, 201, 167, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 201, 167, 0.3);
        }

        .login-header h2 {
            margin-bottom: 25px;
            font-weight: 800;
            font-size: 32px;
        }

        .user-icon {
            font-size: 64px;
            color: #00c9a7;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #e63946;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
        }

        .hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .btn-block {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            background: #00c9a7;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn-block:hover {
            background: #00897b;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="user-icon">👤🔒</div>
        <div class="login-header">
            <h2>Reset password</h2>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>New password</label>
                <div class="input-wrapper">
                    <i>🔒</i>
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                </div>
                <p class="hint">(minimum 6 characters in length)</p>
            </div>

            <div class="form-group">
                <label>Confirm new password</label>
                <div class="input-wrapper">
                    <i>🔒</i>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
                <p class="hint">(minimum 6 characters in length)</p>
            </div>

            <button type="submit" class="btn-block" id="resetBtn">Reset password</button>
        </form>
    </div>

    <script type="module">
        import { authAPI } from './js/api.js';
        import { showToast } from './js/notifications.js';

        const resetForm = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');

        // Get token and role from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const role = urlParams.get('role');

        if (!token) {
            showToast("Invalid reset link.", "error");
            setTimeout(() => {
                if (role === 'student') window.location.href = 'student_login.html';
                else window.location.href = 'faculty_login.html';
            }, 3000);
        }

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword.length < 6) {
                showToast("Password must be at least 6 characters.", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast("Passwords do not match.", "error");
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            try {
                const result = await authAPI.resetPassword(token, newPassword);
                showToast(result.message, "success");
                setTimeout(() => {
                    if (role === 'student') window.location.href = 'student_login.html';
                    else window.location.href = 'faculty_login.html';
                }, 3000);
            } catch (error) {
                showToast(error.message || "Failed to reset password.", "error");
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset password';
            }
        });
    </script>
</body>

</html>
