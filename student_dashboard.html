<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Dashboard - Exam Sync</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            background: transparent;
            color: var(--text-dark);
            font-family: 'Poppins', sans-serif;
            margin: 0;
        }

        .dashboard-nav {
            background: var(--surface);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-soft);
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-brand {
            font-weight: 800;
            font-size: 22px;
            color: var(--navy);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-pill {
            background: rgba(124, 119, 255, 0.10);
            color: var(--navy);
            padding: 8px 18px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .logout-link {
            text-decoration: none;
            color: var(--text-light);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .welcome-hero {
            background: linear-gradient(135deg, rgba(124, 119, 255, 1) 0%, rgba(64, 217, 198, 1) 100%);
            border-radius: 24px;
            padding: 60px;
            color: white;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .welcome-hero h1 {
            font-size: 42px;
            font-weight: 800;
            margin: 0 0 10px;
        }

        .welcome-hero p {
            font-size: 18px;
            opacity: 0.9;
            margin: 0;
        }

        .category-tag {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--navy);
            margin: 0;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .subject-card {
            background: var(--surface-strong);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-soft);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .subject-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .sub-icon {
            width: 50px;
            height: 50px;
            background: rgba(124, 119, 255, 0.10);
            color: var(--navy);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 20px;
        }

        .subject-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 5px;
            color: var(--navy);
        }

        .subject-card p {
            color: var(--text-light);
            font-size: 14px;
            margin: 0 0 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .stat-badge {
            font-size: 12px;
            font-weight: 700;
            color: var(--navy);
            background: rgba(64, 217, 198, 0.16);
            padding: 4px 10px;
            border-radius: 8px;
        }

        /* Category Section Styles */
        .category-section {
            margin-bottom: 40px;
        }

        .category-section-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 20px;
            padding: 16px 24px;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
        }

        .category-section-header::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
        }

        .category-section-header.theory-header {
            background: rgba(99, 102, 241, 0.08);
        }

        .category-section-header.theory-header::before {
            background: linear-gradient(180deg, #6366f1, #818cf8);
        }

        .category-section-header.lab-header {
            background: rgba(16, 185, 129, 0.08);
        }

        .category-section-header.lab-header::before {
            background: linear-gradient(180deg, #10b981, #34d399);
        }

        .category-section-header.activity-header {
            background: rgba(245, 158, 11, 0.08);
        }

        .category-section-header.activity-header::before {
            background: linear-gradient(180deg, #f59e0b, #fbbf24);
        }

        .category-icon {
            font-size: 28px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .theory-header .category-icon {
            background: rgba(99, 102, 241, 0.12);
        }

        .lab-header .category-icon {
            background: rgba(16, 185, 129, 0.12);
        }

        .activity-header .category-icon {
            background: rgba(245, 158, 11, 0.12);
        }

        .category-section-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: var(--navy);
            margin: 0;
        }

        .category-section-header .cat-count {
            margin-left: auto;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 12px;
            border-radius: 20px;
        }

        /* Logout Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(16, 24, 40, 0.4);
            backdrop-filter: blur(8px);
            z-index: 4000;
            justify-content: center;
            align-items: center;
            animation: fadeInLogout 0.3s ease;
        }

        @keyframes fadeInLogout {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .logout-modal {
            background: white;
            width: 450px;
            max-width: 90%;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            text-align: center;
            border: 1px solid var(--border-soft, #eee);
            animation: slideUpLogout 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideUpLogout {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logout-modal h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--navy, #111827);
            margin: 0 0 15px 0;
            line-height: 1.3;
        }

        .logout-modal p {
            font-size: 14px;
            color: var(--text-light, #6b7280);
            margin: 0 0 30px 0;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-confirm-logout {
            background: var(--coral, #ff6b6b);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-confirm-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-cancel-logout {
            background: #f1f5f9;
            color: var(--text-light, #6b7280);
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }

        .btn-cancel-logout:hover {
            background: #e2e8f0;
            color: var(--navy, #111827);
        }
    </style>
</head>

<body>
    <nav class="dashboard-nav">
        <div class="nav-brand">
            <a href="academic_profile.html"
                style="text-decoration: none; color: var(--navy); display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 20px;">←</span>
                <span>Exam Sync</span>
            </a>
        </div>
        <div class="user-menu">
            <div class="user-pill">
                <span id="studentName">Student</span>
                <span id="studentSem" class="role-badge" style="background: var(--mint);">Semester ?</span>
            </div>
            <span id="logoutBtn" class="logout-link">Logout</span>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-hero">
            <span class="category-tag">My Learning Journey</span>
            <h1 id="welcomeTitle">Hello Student!</h1>
            <p>Your personalized curriculum for this semester is ready.</p>
        </div>

        <div class="section-header">
            <h2>Current Subjects</h2>
            <div id="subCount" style="color: var(--text-light); font-weight: 600;">0 Subjects Total</div>
        </div>

        <div class="subjects-grid" id="subjectsGrid">
            <!-- Subjects will be loaded here -->
        </div>
    </div>

    <!-- Logout Modal -->
    <div class="modal-overlay" id="logoutModal">
        <div class="logout-modal">
            <h2>Are you sure you want to log out?</h2>
            <p>You will need to log in again to access your account.</p>
            <div class="modal-buttons">
                <button class="btn-confirm-logout" id="confirmLogoutBtn">Log out</button>
                <button class="btn-cancel-logout" id="cancelLogoutBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Direct fetch used instead of API
        import { requireAuth, logout } from './js/auth.js';
        import { curriculumAPI } from './js/api.js';

        const user = await requireAuth(['student']);
        if (!user) { window.location.href = 'Login.html'; }

        // Read year/branch/sem from URL params
        const urlParams = new URLSearchParams(window.location.search);
        const urlYear = urlParams.get('year');
        const urlBranch = urlParams.get('branch');
        const urlSem = urlParams.get('sem');

        // If no URL params, redirect to academic profile page
        if (!urlYear) {
            window.location.href = 'academic_profile.html';
        }

        const viewYear = parseInt(urlYear) || 1;
        const viewBranch = urlBranch || user.branch || 'CSE';
        const viewSemester = parseInt(urlSem) || 1;

        if (user) {
            document.getElementById('studentName').textContent = user.name;
            document.getElementById('welcomeTitle').textContent = `Hello, ${user.name.split(' ')[0]}!`;
            const yearLabel = viewYear === 1 ? '1st Year' : viewYear === 2 ? '2nd Year' : viewYear === 3 ? '3rd Year' : '4th Year';
            document.getElementById('studentSem').textContent = viewYear === 1 ? yearLabel : `${viewBranch} - Sem ${viewSemester}`;
        }

        const logoutModal = document.getElementById('logoutModal');
        const confirmLogoutBtn = document.getElementById('confirmLogoutBtn');
        const cancelLogoutBtn = document.getElementById('cancelLogoutBtn');

        document.getElementById('logoutBtn').onclick = () => {
            logoutModal.style.display = 'flex';
        };

        cancelLogoutBtn.onclick = () => {
            logoutModal.style.display = 'none';
        };

        confirmLogoutBtn.onclick = () => {
            logout('student_login.html');
        };

        async function loadSubjects() {
            if (!user) return;
            const grid = document.getElementById('subjectsGrid');
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">Loading curriculum...</div>';
            
            try {
                const subjects = await curriculumAPI.getSubjects(viewBranch, viewSemester);
                
                if (!subjects || subjects.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">No subjects found for this semester.</div>';
                    return;
                }

                // Check if subjects have categories
                const categories = ['theory', 'lab', 'activity'];
                const hasCategories = subjects.some(s => categories.includes(s.category));

                if (hasCategories) {
                    const totalCount = subjects.length;
                    document.getElementById('subCount').textContent = totalCount + ' Subjects Total';

                    grid.innerHTML = '';
                    grid.style.display = 'block';

                    const categoryConfig = [
                        { key: 'theory', title: 'Theory Subjects', icon: '📖', headerClass: 'theory-header' },
                        { key: 'lab', title: 'Lab Subjects', icon: '🧪', headerClass: 'lab-header' },
                        { key: 'activity', title: 'Activities', icon: '🎯', headerClass: 'activity-header' }
                    ];

                    categoryConfig.forEach(cat => {
                        const catItems = subjects.filter(s => s.category === cat.key);
                        if (catItems.length === 0) return;

                        const section = document.createElement('div');
                        section.className = 'category-section';

                        const header = document.createElement('div');
                        header.className = 'category-section-header ' + cat.headerClass;
                        header.innerHTML = `<div class="category-icon">${cat.icon}</div><h3>${cat.title}</h3><span class="cat-count">${catItems.length} subject${catItems.length > 1 ? 's' : ''}</span>`;
                        section.appendChild(header);

                        const subGrid = document.createElement('div');
                        subGrid.className = 'subjects-grid';
                        subGrid.style.display = 'grid';
                        subGrid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(300px, 1fr))';
                        subGrid.style.gap = '25px';

                        catItems.forEach(sub => {
                            const theme = getSubjectTheme(sub.name);
                            const card = document.createElement('a');
                            card.href = `subject_details.html?id=${sub.id}&name=${encodeURIComponent(sub.name)}&branch=${encodeURIComponent(viewBranch)}&sem=${viewSemester}`;
                            card.className = 'subject-card';
                            card.style.borderLeft = '5px solid ' + theme.primary;

                            let iconEmoji = cat.key === 'lab' ? '🔬' : (cat.key === 'activity' ? '🏃' : '📚');
                            let noteTag = sub.note ? `<span style="font-size: 11px; color: var(--text-light); background: rgba(0,0,0,0.04); padding: 2px 8px; border-radius: 6px; display: inline-block; margin-top: 4px;">${sub.note}</span>` : '';

                            card.innerHTML = `
                                <div class="sub-icon" style="background: ${theme.primary}20; color: ${theme.primary};">${iconEmoji}</div>
                                <div style="flex-grow: 1;">
                                    <h3 style="color: var(--navy);">${sub.name}</h3>
                                    <p style="margin-bottom: 4px;">${sub.code || '1st Year'}</p>
                                    ${noteTag}
                                </div>
                                <div class="card-footer">
                                    <span class="stat-badge" style="background: ${theme.primary}15; color: ${theme.primary}; border: 1px solid ${theme.primary}30;">Curriculum 2024</span>
                                    <span style="color: ${theme.primary}; font-weight: 800;">Study →</span>
                                </div>`;
                            subGrid.appendChild(card);
                        });

                        section.appendChild(subGrid);
                        grid.appendChild(section);
                    });
                } else {
                    document.getElementById('subCount').textContent = subjects.length + ' Subjects Total';
                    grid.innerHTML = '';
                    grid.style.display = 'grid';
                    subjects.forEach(sub => {
                        const theme = getSubjectTheme(sub.name);
                        const card = document.createElement('a');
                        card.href = `subject_details.html?id=${sub.id}&name=${encodeURIComponent(sub.name)}&branch=${encodeURIComponent(viewBranch)}&sem=${viewSemester}`;
                        card.className = 'subject-card';
                        card.style.borderLeft = '5px solid ' + theme.primary;
                        card.innerHTML = `
                            <div class="sub-icon" style="background: ${theme.primary}20; color: ${theme.primary};">📚</div>
                            <div style="flex-grow: 1;">
                                <h3 style="color: var(--navy);">${sub.name}</h3>
                                <p style="margin-bottom: 10px;">${sub.code || (viewBranch + '-' + viewSemester)}</p>
                            </div>
                            <div class="card-footer">
                                <span class="stat-badge" style="background: ${theme.primary}15; color: ${theme.primary}; border: 1px solid ${theme.primary}30;">Curriculum 2024</span>
                                <span style="color: ${theme.primary}; font-weight: 800;">Study →</span>
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (error) {
                console.error('Failed to load subjects:', error);
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--coral);">Failed to load curriculum.</div>';
            }
        }
        function getSubjectTheme(name) {
            name = name.toLowerCase();
            if (name.includes('programming') || name.includes('java') || name.includes('python') || name.includes('data structure')) return { primary: '#3b82f6' };
            if (name.includes('math') || name.includes('algebra') || name.includes('calculus') || name.includes('differential')) return { primary: '#8b5cf6' };
            if (name.includes('physics') || name.includes('chemistry') || name.includes('electronics') || name.includes('circuit')) return { primary: '#06b6d4' };
            if (name.includes('network') || name.includes('security')) return { primary: '#10b981' };
            if (name.includes('workshop') || name.includes('lab')) return { primary: '#059669' };
            if (name.includes('english') || name.includes('communicative')) return { primary: '#ec4899' };
            if (name.includes('mechanical') || name.includes('civil') || name.includes('electrical')) return { primary: '#f97316' };
            if (name.includes('yoga') || name.includes('sports') || name.includes('eca')) return { primary: '#eab308' };
            if (name.includes('nss') || name.includes('ncc') || name.includes('community') || name.includes('cca')) return { primary: '#f59e0b' };
            if (name.includes('graphic') || name.includes('drawing')) return { primary: '#a855f7' };
            return { primary: '#6366f1' };
        }

        loadSubjects();
    </script>
</body>

</html>
